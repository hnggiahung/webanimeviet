# ====== Cấu hình Deploy Netlify cho Web phim hoạt hình ======
# Dự án tĩnh HTML/CSS/JS

[build]
  publish = "."
  command = "echo 'Static site - no build required'"

# ====== Cache Policy: Cache-Control headers ======
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ====== Security & CORS Headers ======
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Access-Control-Allow-Origin = "*"

# ====== Redirect Rules ======
# QUAN TRỌNG: Không dùng /* catch-all vì nó chặn cả file JSON, JS, CSS
# Chỉ redirect cụ thể khi cần

[[redirects]]
  from = "/home"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/watch"
  to = "/watch.html"
  status = 200

[[redirects]]
  from = "/start"
  to = "/start.html"
  status = 200

[[redirects]]
  from = "/control-panel"
  to = "/control-panel.html"
  status = 200

# 404 fallback - Chỉ redirect khi file thực sự không tồn tại
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404