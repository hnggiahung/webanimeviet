# ====== Cấu hình Deploy Netlify cho Web phim hoạt hình ======
# Dự án tĩnh HTML/CSS/JS

[build]
  publish = "."
  command = "echo 'Static site - no build required'"

# ====== III. Cache Policy: Cache-Control headers ======
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ====== Security & CORS Headers ======
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    # Cho phép API call từ client-side
    Access-Control-Allow-Origin = "*"

# ====== Redirect Rules ======
# Chỉ redirect khi file không tồn tại (tránh lỗi SPA)
[[redirects]]
  from = "/home"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/watch"
  to = "/watch.html"
  status = 200

[[redirects]]
  from = "/start"
  to = "/start.html"
  status = 200

# ====== SPA Fallback - Quan trọng: Chuyển hướng mọi request không tìm thấy file về index.html ======
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404
