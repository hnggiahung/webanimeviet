# ====== Cấu hình Deploy Netlify cho Web phim hoạt hình ======
# Dự án tĩnh HTML/CSS/JS
# Lưu ý: File _redirects (cùng cấp) có độ ưu tiên cao hơn netlify.toml
# và đã xử lý SPA fallback: /* /index.html 200

[build]
  publish = "/"
  command = ""

# ====== Cache Policy: Cache-Control headers ======
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ====== Security & CORS Headers ======
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Access-Control-Allow-Origin = "*"